name: Test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # 26 enables WebAssembly JSPI (Suspending/promising) by default. The
          # self-hosted `twk` binary imports the task ABI (the `lsp` command uses
          # Channel/Task), so it needs a JSPI-capable runtime to instantiate at
          # all — even for `twk build`. Node 24 gates JSPI behind a flag.
          node-version: 26

      - name: Run tests
        run: make test
